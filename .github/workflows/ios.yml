name: iOS Build & Test

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild build \
            -project Sidequest3.xcodeproj \
            -scheme Sidequest3 \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project Sidequest3.xcodeproj \
            -scheme Sidequest3 \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:Sidequest3Tests \
            -configuration Debug \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Publish test results
        uses: kishikawakatsumi/xcresulttool@v1
        if: always()
        with:
          path: TestResults.xcresult
          title: iOS Tests

  swiftlint:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging Sidequest3/
